<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodstock's Labyrinth Adventure</title>
    <style>
        body {
            background-color: #f7ebec; /* Light pinkish background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            flex-direction: column;
        }
        h1 {
            color: #222;
            margin-bottom: 5px;
            font-size: 26px;
            text-align: center;
            font-weight: bold;
        }
        h2.instructions {
            color: #555;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            font-weight: normal;
            background: #ffeaa7;
            padding: 6px 15px;
            border-radius: 20px;
            border: 2px solid #000;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background-color: #fff5f6; /* Soft interior path color */
            border: 15px solid #000000; /* Crisp thick outer black border */
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            display: block;
        }
        /* Victory Popup Screen */
        #victoryModal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            border: 5px solid #000000;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-radius: 10px;
            width: 320px;
            z-index: 10;
        }
        #victoryModal h2 {
            margin-top: 0;
            color: #e67e22;
            font-size: 32px;
        }
        #victoryModal p {
            color: #333;
            font-size: 16px;
            margin-bottom: 25px;
        }
        #victoryButton {
            background-color: #f1c40f; /* Peanuts Character Yellow */
            color: #000;
            border: 3px solid #000;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.1s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        #victoryButton:hover {
            background-color: #e6b800;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Help Woodstock Reach Snoopy!</h1>
    <h2 class="instructions">⌨️ Use your <b>Arrow Keys</b> to move through the maze</h2>
    
    <div id="gameContainer">
        <canvas id="mazeCanvas" width="650" height="650"></canvas>
        
        <div id="victoryModal">
            <h2>Reunited!</h2>
            <p>You successfully navigated the tricky labyrinth corridors.</p>
            <a href="https://www.google.com" id="victoryButton">Continue to Webpage</a>
        </div>
    </div>

<script>
const canvas = document.getElementById("mazeCanvas");
const ctx = canvas.getContext("2d");
const victoryModal = document.getElementById("victoryModal");

// Embedded Woodstock Graphic
const woodstockImg = new Image();
woodstockImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><ellipse cx="50" cy="45" rx="25" ry="20" fill="%23f1c40f" stroke="black" stroke-width="4"/><circle cx="60" cy="40" r="4" fill="black"/><path d="M 45 25 Q 35 15 25 30 Q 15 45 35 45" fill="%23f1c40f" stroke="black" stroke-width="4"/><path d="M 30 55 Q 15 70 35 80 Q 55 90 50 65" fill="%23f1c40f" stroke="black" stroke-width="4"/><path d="M 55 50 Q 70 55 65 45" stroke="black" stroke-width="4" fill="none"/></svg>';

// Embedded Snoopy Graphic
const snoopyImg = new Image();
snoopyImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><ellipse cx="45" cy="45" rx="22" ry="20" fill="white" stroke="black" stroke-width="4"/><ellipse cx="30" cy="48" rx="8" ry="14" fill="black"/><circle cx="55" cy="40" r="3" fill="black"/><path d="M 67 45 Q 75 45 72 52 Q 65 55 63 47 Z" fill="black"/><path d="M 45 65 Q 45 85 45 85" stroke="red" stroke-width="6" stroke-linecap="round"/></svg>';

// Scaled-up Actor Properties
const player = {
    x: 20,
    y: 20,
    size: 55, // Enlarged size
    speed: 4.5
};

const goal = {
    x: 575,
    y: 575,
    width: 55, // Enlarged size
    height: 55
};

// Intricate, highly detailed 650x650 layout structure
const walls = [
    // Column 1 sectors
    { x: 90, y: 0, width: 20, height: 160 },
    { x: 0, y: 240, width: 180, height: 20 },
    { x: 90, y: 240, width: 20, height: 160 },
    { x: 0, y: 480, width: 100, height: 20 },

    // Core central grid channels
    { x: 180, y: 80, width: 20, height: 180 },
    { x: 180, y: 80, width: 140, height: 20 },
    { x: 180, y: 340, width: 140, height: 20 },
    { x: 180, y: 440, width: 20, height: 120 },
    { x: 90, y: 560, width: 200, height: 20 },

    // Middle division dividers
    { x: 320, y: 0, width: 20, height: 180 },
    { x: 320, y: 240, width: 20, height: 220 },
    { x: 260, y: 460, width: 160, height: 20 },

    // Eastern quadrant forks
    { x: 420, y: 80, width: 140, height: 20 },
    { x: 440, y: 80, width: 20, height: 280 },
    { x: 320, y: 240, width: 140, height: 20 },
    { x: 440, y: 360, width: 120, height: 20 },

    // Final boundary corridors
    { x: 560, y: 160, width: 20, height: 320 },
    { x: 440, y: 480, width: 140, height: 20 },
    { x: 320, y: 560, width: 240, height: 20 }
];

// Track Keyboard State Transitions
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Disallow browser background scroll behaviors
window.addEventListener("keydown", e => {
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
}, false);

let gameWon = false;

// Universal standard boundary collision arithmetic
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.size > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.size > rect2.y;
}

function checkWallCollision(newX, newY) {
    const dummy = { x: newX, y: newY, size: player.size };
    
    // Check main structural canvas boundary borders
    if (newX < 0 || newX + player.size > canvas.width || newY < 0 || newY + player.size > canvas.height) {
        return true;
    }
    
    // Check individual line coordinate blocks
    for (let wall of walls) {
        if (checkCollision(dummy, wall)) {
            return true;
        }
    }
    return false;
}

// Processing movement vectors
function update() {
    if (gameWon) return;

    let newX = player.x;
    let newY = player.y;

    if (keys["ArrowLeft"])  newX -= player.speed;
    if (keys["ArrowRight"]) newX += player.speed;
    if (keys["ArrowUp"])    newY -= player.speed;
    if (keys["ArrowDown"])  newY += player.speed;

    // Slide safely on X axis
    if (!checkWallCollision(newX, player.y)) {
        player.x = newX;
    }
    // Slide safely on Y axis
    if (!checkWallCollision(player.x, newY)) {
        player.y = newY;
    }

    // Win evaluation target trigger check
    const goalRect = { x: goal.x, y: goal.y, size: goal.width, width: goal.width, height: goal.height };
    if (checkCollision(player, goalRect)) {
        gameWon = true;
        victoryModal.style.display = "block";
    }
}

// Render Pipeline
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Render Target Destination Point (Snoopy)
    ctx.drawImage(snoopyImg, goal.x, goal.y, goal.width, goal.height);

    // Render Geometric Structural Labyrinth Core Wall Units
    ctx.fillStyle = "#000000";
    for (let wall of walls) {
        ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
    }

    // Render Main Controlling Hero (Woodstock)
    ctx.drawImage(woodstockImg, player.x, player.y, player.size, player.size);
    
    // Render Overlay Shadow layer during popup displays
    if (gameWon) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

// Frame timing core engine loop execution
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Asset Initialization Event Wire Hooks
let assetsLoaded = 0;
function assetHook() {
    assetsLoaded++;
    if(assetsLoaded >= 2) gameLoop();
}
woodstockImg.onload = assetHook;
snoopyImg.onload = assetHook;

// Fallback protection handler execution trigger
setTimeout(() => { if(assetsLoaded < 2) gameLoop(); }, 500);
</script>

</body>
</html>
