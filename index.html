<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodstock's Maze Adventure</title>
    <style>
        body {
            background-color: #f7ebec; /* Light pinkish/off-white background matching the image vibe */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            flex-direction: column;
        }
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 24px;
            text-align: center;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            background-color: #fff5f6; /* Soft interior track color */
            border: 15px solid #000000; /* Crisp thick black maze borders */
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: block;
        }
        /* Custom Victory Modal Overlay */
        #victoryModal {
            display: none; /* Hidden by default */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            border: 5px solid #000000;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 10px;
            width: 300px;
            z-index: 10;
        }
        #victoryModal h2 {
            margin-top: 0;
            color: #e67e22; /* Woodstock orange-yellow accent */
            font-size: 28px;
        }
        #victoryModal p {
            color: #333;
            font-size: 16px;
            margin-bottom: 20px;
        }
        #victoryButton {
            background-color: #f1c40f; /* Peanuts Yellow */
            color: #000;
            border: 3px solid #000;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        #victoryButton:hover {
            background-color: #e6b800;
        }
    </style>
</head>
<body>

    <h1>Help Woodstock Reach Snoopy!</h1>
    
    <div id="gameContainer">
        <canvas id="mazeCanvas" width="600" height="600"></canvas>
        
        <div id="victoryModal" id="modalBox">
            <h2>You Found Snoopy!</h2>
            <p>Woodstock safely navigated the labyrinth.</p>
            <a href="https://akhtar077.github.io/Snoopy-wish/" id="victoryButton">Continue to Webpage</a>
        </div>
    </div>

<script>
const canvas = document.getElementById("mazeCanvas");
const ctx = canvas.getContext("2d");
const victoryModal = document.getElementById("victoryModal");

// Load Character Images
const woodstockImg = new Image();
woodstockImg.src = 'Woodstock.webp';

const snoopyImg = new Image();
snoopyImg.src = 'sn-color.avif';

// Player (Woodstock) Properties
const player = {
    x: 35,
    y: 35,
    size: 30, // Fits perfectly inside corridors
    speed: 4
};

// Goal (Snoopy) Properties
const goal = {
    x: 525,
    y: 525,
    width: 45,
    height: 45
};

// Clean, simplified structural walls map based on a balanced 600x600 grid
const walls = [
    // Outer border limits are already handled by canvas bounds logic, 
    // these are the internal geometric dividers:
    { x: 100, y: 0, width: 20, height: 120 },
    { x: 100, y: 200, width: 20, height: 160 },
    { x: 0, y: 460, width: 220, height: 20 },
    
    { x: 200, y: 100, width: 200, height: 20 },
    { x: 200, y: 120, width: 20, height: 120 },
    { x: 100, y: 340, width: 220, height: 20 },
    
    { x: 300, y: 220, width: 20, height: 240 },
    { x: 200, y: 460, width: 20, height: 140 },
    
    { x: 420, y: 0, width: 20, height: 240 },
    { x: 420, y: 220, width: 100, height: 20 },
    
    { x: 420, y: 340, width: 180, height: 20 },
    { x: 420, y: 440, width: 20, height: 100 }
];

// Track Keyboard Inputs
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Prevent window scroll adjustments
window.addEventListener("keydown", e => {
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
}, false);

let gameWon = false;

// Collision calculation checks
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.size > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.size > rect2.y;
}

function checkWallCollision(newX, newY) {
    const dummy = { x: newX, y: newY, size: player.size };
    
    // Canvas border boundary constraints
    if (newX < 0 || newX + player.size > canvas.width || newY < 0 || newY + player.size > canvas.height) {
        return true;
    }
    
    // Solid wall intersections
    for (let wall of walls) {
        if (checkCollision(dummy, wall)) {
            return true;
        }
    }
    return false;
}

// Update game physics state
function update() {
    if (gameWon) return;

    let newX = player.x;
    let newY = player.y;

    if (keys["ArrowLeft"])  newX -= player.speed;
    if (keys["ArrowRight"]) newX += player.speed;
    if (keys["ArrowUp"])    newY -= player.speed;
    if (keys["ArrowDown"])  newY += player.speed;

    // Fluid horizontal step sliding evaluation
    if (!checkWallCollision(newX, player.y)) {
        player.x = newX;
    }
    // Fluid vertical step sliding evaluation
    if (!checkWallCollision(player.x, newY)) {
        player.y = newY;
    }

    // Win condition trigger execution
    const goalRect = { x: goal.x, y: goal.y, size: goal.width, width: goal.width, height: goal.height };
    if (checkCollision(player, goalRect)) {
        gameWon = true;
        victoryModal.style.display = "block"; // Trigger custom HTML box display
    }
}

// Drawing sequence engine
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Snoopy Goal Target
    ctx.drawImage(snoopyImg, goal.x, goal.y, goal.width, goal.height);

    // Draw Solid Black Internal Structural Maze Obstacles
    ctx.fillStyle = "#000000";
    for (let wall of walls) {
        ctx.fillRect(wall.x, wall.y, wall.width, wall.height);
    }

    // Draw Player (Woodstock Character Icon)
    ctx.drawImage(woodstockImg, player.x, player.y, player.size, player.size);
    
    // Dim background canvas elements during victory popups
    if (gameWon) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

// Constant cyclic frame heartbeat execution loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Launch loop engine on document initialization asset ready cycle
window.onload = () => {
    gameLoop();
};
</script>

</body>
</html>
