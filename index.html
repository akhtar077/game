<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Woodstock's Maze Adventure</title>
    <style>
        body {
            background-color: #f7ebec;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            flex-direction: column;
        }
        h1 {
            color: #222;
            margin-bottom: 5px;
            font-size: 26px;
            text-align: center;
            font-weight: bold;
        }
        h2.instructions {
            color: #555;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
            font-weight: normal;
            background: #ffeaa7;
            padding: 6px 15px;
            border-radius: 20px;
            border: 2px solid #000;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 15px solid #000000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            display: block;
        }
        #victoryModal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            border: 5px solid #000000;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border-radius: 10px;
            width: 320px;
            z-index: 10;
        }
        #victoryModal h2 {
            margin-top: 0;
            color: #e67e22;
            font-size: 32px;
        }
        #victoryModal p {
            color: #333;
            font-size: 16px;
            margin-bottom: 25px;
        }
        #victoryButton {
            background-color: #f1c40f;
            color: #000;
            border: 3px solid #000;
            padding: 12px 28px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.1s, background-color 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        #victoryButton:hover {
            background-color: #e6b800;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Help Woodstock Reach Snoopy!</h1>
    <h2 class="instructions">⌨️ Use your <b>Arrow Keys</b> to move through the maze</h2>
    
    <div id="gameContainer">
        <canvas id="mazeCanvas" width="960" height="540"></canvas>
        
        <div id="victoryModal">
            <h2>Reunited!</h2>
            <p>You successfully navigated the tricky labyrinth corridors.</p>
            <a href="https://www.google.com" id="victoryButton">Continue to Webpage</a>
        </div>
    </div>

<script>
const canvas = document.getElementById("mazeCanvas");
const ctx = canvas.getContext("2d");
const victoryModal = document.getElementById("victoryModal");

// Load the Maze Image you provided as the visual map background
const mazeBgImg = new Image();
mazeBgImg.src = 'background_maze.png';

// Embedded Woodstock Graphic
const woodstockImg = new Image();
woodstockImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><ellipse cx="50" cy="45" rx="25" ry="20" fill="%23f1c40f" stroke="black" stroke-width="4"/><circle cx="60" cy="40" r="4" fill="black"/><path d="M 45 25 Q 35 15 25 30 Q 15 45 35 45" fill="%23f1c40f" stroke="black" stroke-width="4"/><path d="M 30 55 Q 15 70 35 80 Q 55 90 50 65" fill="%23f1c40f" stroke="black" stroke-width="4"/><path d="M 55 50 Q 70 55 65 45" stroke="black" stroke-width="4" fill="none"/></svg>';

// Embedded Snoopy Graphic
const snoopyImg = new Image();
snoopyImg.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><ellipse cx="45" cy="45" rx="22" ry="20" fill="white" stroke="black" stroke-width="4"/><ellipse cx="30" cy="48" rx="8" ry="14" fill="black"/><circle cx="55" cy="40" r="3" fill="black"/><path d="M 67 45 Q 75 45 72 52 Q 65 55 63 47 Z" fill="black"/><path d="M 45 65 Q 45 85 45 85" stroke="red" stroke-width="6" stroke-linecap="round"/></svg>';

// Actor scale and coordinates positioned to align with your image lanes
const player = {
    x: 580, // Woodstock starts right in the path where he is shown in your image
    y: 250,
    size: 45, 
    speed: 4
};

const goal = {
    x: 460, // Snoopy sits waiting at the center-top exit path
    y: 15,
    width: 45,
    height: 45
};

// Physics Collision bounding blocks mapped precisely over your image's wall lines
const walls = [
    // Outer Border Walls
    { x: 0, y: 0, width: 960, height: 12 },
    { x: 0, y: 528, width: 960, height: 12 },
    { x: 0, y: 0, width: 12, height: 540 },
    { x: 948, y: 0, width: 12, height: 540 },
    
    // Primary Structural Horizontal Divider Blocks
    { x: 12, y: 105, width: 180, height: 12 },
    { x: 75, y: 200, width: 320, height: 12 },
    { x: 12, y: 380, width: 220, height: 12 },
    { x: 420, y: 105, width: 420, height: 12 },
    { x: 505, y: 200, width: 180, height: 12 },
    { x: 535, y: 310, width: 340, height: 12 },
    { x: 240, y: 415, width: 440, height: 12 },
    { x: 720, y: 415, width: 150, height: 12 },

    // Core Grid Vertical Columns
    { x: 110, y: 12, width: 12, height: 140 },
    { x: 235, y: 105, width: 12, height: 210 },
    { x: 415, y: 12, width: 12, height: 415 },
    { x: 520, y: 12, width: 12, height: 140 },
    { x: 710, y: 105, width: 12, height: 250 },
    { x: 865, y: 200, width: 12, height: 280 },
    { x: 110, y: 380, width: 12, height: 100 },
    { x: 310, y: 310, width: 12, height: 180 },
    { x: 610, y: 415, width: 12, height: 115 }
];

// Input engine systems
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

window.addEventListener("keydown", e => {
    if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1) {
        e.preventDefault();
    }
}, false);

let gameWon = false;

function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.size > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.size > rect2.y;
}

function checkWallCollision(newX, newY) {
    const dummy = { x: newX, y: newY, size: player.size };
    if (newX < 0 || newX + player.size > canvas.width || newY < 0 || newY + player.size > canvas.height) {
        return true;
    }
    for (let wall of walls) {
        if (checkCollision(dummy, wall)) {
            return true;
        }
    }
    return false;
}

function update() {
    if (gameWon) return;

    let newX = player.x;
    let newY = player.y;

    if (keys["ArrowLeft"])  newX -= player.speed;
    if (keys["ArrowRight"]) newX += player.speed;
    if (keys["ArrowUp"])    newY -= player.speed;
    if (keys["ArrowDown"])  newY += player.speed;

    if (!checkWallCollision(newX, player.y)) {
        player.x = newX;
    }
    if (!checkWallCollision(player.x, newY)) {
        player.y = newY;
    }

    const goalRect = { x: goal.x, y: goal.y, size: goal.width, width: goal.width, height: goal.height };
    if (checkCollision(player, goalRect)) {
        gameWon = true;
        victoryModal.style.display = "block";
    }
}

// Render Pipeline Processing
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Draw your image as the canvas background landscape map
    ctx.drawImage(mazeBgImg, 0, 0, canvas.width, canvas.height);

    // 2. Draw Target Goal (Snoopy) over his spot
    ctx.drawImage(snoopyImg, goal.x, goal.y, goal.width, goal.height);

    // 3. Draw Player Character (Woodstock)
    ctx.drawImage(woodstockImg, player.x, player.y, player.size, player.size);
    
    // Dark transparent tint layer during victory popup displays
    if (gameWon) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Sync checking setup to make sure all assets and background images compile correctly
let assetsLoaded = 0;
function assetHook() {
    assetsLoaded++;
    if(assetsLoaded >= 3) gameLoop();
}
mazeBgImg.onload = assetHook;
woodstockImg.onload = assetHook;
snoopyImg.onload = assetHook;

// Fallback runtime verification handler
setTimeout(() => { if(assetsLoaded < 3) gameLoop(); }, 600);
</script>

</body>
</html>
